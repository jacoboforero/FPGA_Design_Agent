tools:
  iverilog:
    commands:
      build:
        template: "{tool} -g2012 -g2005-sv -o {output} {sources}"
        timeout_seconds: 30
    capabilities:
      supports_dump: false

  vvp:
    commands:
      run:
        template: "{tool} {binary}"
        timeout_seconds: 30
      run_with_dump:
        template: "{tool} {binary} +DUMP +DUMP_FILE={waveform_path} {window_args}"
        timeout_seconds: 30
    capabilities:
      supports_dump: true
      dump_plusarg: "+DUMP"
      dump_file_plusarg: "+DUMP_FILE"
      dump_start_plusarg: "+DUMP_START"
      dump_end_plusarg: "+DUMP_END"

  verilator:
    commands:
      lint:
        template: "{tool} --lint-only --quiet --sv {sources}"
        timeout_seconds: 10
    capabilities:
      error_marker: "%Error"
      fatal_marker: "%Fatal"
