rag:
  enabled: true
  fail_open: true
  allow_benchmark: false
  knowledge_base_path: adapters/rag/verilog_knowledge_base.txt
  memory_file: memory.json
  archive_root: runs
  embedding_provider: openai
  openai_embedding_model: text-embedding-3-small
  stored_rtl_embed_max_chars: 12000

  implementation:
    enabled: true
    top_k: 3
    retrieve_multiple: 2
    max_context_chars: 5000

  testbench:
    enabled: true
    top_k: 2
    retrieve_multiple: 2
    max_context_chars: 4500

  debug:
    enabled: true
    top_k: 2
    retrieve_multiple: 2
    max_context_chars: 4500

  finalizer:
    enabled: false
    llm_summary_enabled: true
    summary_max_rtl_chars: 12000
    summary_max_tb_chars: 12000
