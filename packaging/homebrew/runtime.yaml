run:
  spec_profile:
    interaction: interactive
    rigor_level: L2
  verification_profile: testbench-agent

agents:
  pools:
    implementation: 1
    testbench: 1
    reflection: 1
    debug: 1
    spec_helper: 1
    planner: 1
    lint: 1
    tb_lint: 1
    acceptance: 1
    distill: 1
    simulation: 1
  llm:
    enabled: true
    provider: openai
    defaults:
      model: gpt-4.1-mini
      request_timeout_s: 120.0
      json_mode: true
      max_tokens: 10000
      temperature: 0.2
      top_p: null
    rate_control:
      adaptive_enabled: true
      max_in_flight_min: 1
      max_in_flight_default: 4
      max_in_flight_max: 8
      backoff_on_429: true
    roles:
      spec_helper:
        model: null
        phases:
          extract:
            max_tokens: 4000
            temperature: 0.2
          question:
            max_tokens: 1500
            temperature: 0.3
          draft:
            max_tokens: 2500
            temperature: 0.4
      planner:
        model: null
        max_tokens: 6000
        temperature: 0.2
      implementation:
        model: null
        max_tokens: 7000
        temperature: 0.2
      testbench:
        model: null
        max_tokens: 7000
        temperature: 0.2
      reflection:
        model: null
        max_tokens: 6000
        temperature: 0.2
      debug:
        model: null
        max_tokens: 7000
        temperature: 0.2
      narrator:
        model: null
        fallback_model: gpt-4.1
        max_tokens: 220
        temperature: 0.5
        timeout_s: 10.0

cli:
  default_narrative_mode: deterministic
  narrative_show_state: false
  execution_narrator_async: true
  execution_narrator_order_mode: strict
  execution_narrator_queue_max_events: 256

infrastructure:
  broker:
    url: amqp://guest:guest@localhost:5672/
    heartbeat: 600
    blocked_connection_timeout: 300.0
    connection_attempts: 5
    retry_delay: 2.0
    socket_timeout: 10.0
    reconnect_delay_s: 1.0
    task_max_retries: 1
    purge_queues_on_start: true
    planner_timeout_s: 60.0
    results_consume_mode: consume
  tool_paths:
    verilator: null
    iverilog: null
    vvp: null

verification:
  lint:
    verilator_strict_warnings: false
    rtl_fail_moddup: true
    rtl_semantic_enabled: true
    rtl_semantic_strict: true
    tb_semantic_enabled: true
    tb_semantic_strict: true
  sim:
    fail_window_before: 20
    fail_window_after: 5
    vcd_max_signals: 40
    vcd_max_changes_per_signal: 200
    vcd_time_window_before: 2000
    vcd_time_window_after: 2000
  debug:
    local_lint_timeout_s: 12.0
    local_lint_max_lines: 20

benchmark:
  verilog_eval_root: third_party/verilog-eval
  prompts_dir: third_party/verilog-eval/dataset_spec-to-rtl
  output_root: artifacts/benchmarks/verilog_eval
  oracle_manifest: null
  flow_mode: direct_single_module
  prompt_mode: raw_verilog_eval
  disable_tb_generation: true
  debug_rtl_only: true
  use_public_testbench: true
  interface_equivalence: canonical_width
  rtl_language: systemverilog
  sim_run_timeout_s: 90.0
  near_miss_extra_retry_enabled: true
  near_miss_max_mismatches: 20
  near_miss_extra_debug_retries: 1
  canonical:
    n: 1
    temperature: 0.0
    top_p: 0.01
  sampled:
    n: 20
    temperature: 0.8
    top_p: 0.95
